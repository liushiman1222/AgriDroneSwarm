name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check version
        run: moon version

      - name: moon check
        run: moon check

      - name: moon fmt --check
        run: moon fmt --check

      - name: moon info
        run: moon info

      - name: moon test
        run: moon test